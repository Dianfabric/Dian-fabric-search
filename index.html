<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원단 단가 검색</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #c8f542;
    --accent2: #42f5a1;
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* 상단 헤더 */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .status-badge {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .status-badge.connected {
    color: var(--accent2);
    border-color: var(--accent2);
  }

  /* 검색창 */
  .search-wrap {
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 48px 13px 16px;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
  }

  .search-input::placeholder {
    color: var(--text-dim);
  }

  .search-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--accent);
    border: none;
    border-radius: 8px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .search-btn:active { opacity: 0.7; }

  .search-btn svg {
    width: 16px;
    height: 16px;
    fill: #000;
  }

  /* 설정 패널 */
  .setup-panel {
    margin: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .setup-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }

  .setup-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .setup-icon {
    width: 16px;
    height: 16px;
    fill: var(--text-muted);
  }

  .setup-arrow {
    font-size: 12px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }

  .setup-arrow.open { transform: rotate(180deg); }

  .setup-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }

  .setup-body.open { display: block; }

  .setup-field {
    margin-top: 12px;
  }

  .setup-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .setup-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    outline: none;
  }

  .setup-input:focus {
    border-color: var(--accent);
  }

  .save-btn {
    margin-top: 14px;
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .save-btn:active { opacity: 0.8; }

  /* 메인 콘텐츠 */
  .main {
    padding: 16px 20px;
  }

  /* 로딩 */
  .loading {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }

  .loading.active { display: block; }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* 결과 없음 */
  .empty {
    display: none;
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }

  .empty.active { display: block; }

  .empty-emoji { font-size: 36px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* 결과 카드 */
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .results-count {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
  }

  .results-count span {
    color: var(--accent);
    font-weight: 500;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s, transform 0.1s;
    cursor: pointer;
  }

  .card:active {
    transform: scale(0.99);
    border-color: var(--accent);
  }

  .card-name {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 10px;
    line-height: 1.4;
    color: var(--text);
  }

  .card-price {
    font-size: 22px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .card-price-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .tag.highlight {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* 초기 화면 */
  .welcome {
    text-align: center;
    padding: 50px 20px;
  }

  .welcome-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .welcome-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .welcome-sub {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  /* 에러 */
  .error-msg {
    display: none;
    background: #2a1515;
    border: 1px solid #5a2020;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    color: #ff8080;
    margin-bottom: 12px;
  }

  .error-msg.active { display: block; }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">원단 단가 검색</span>
    </div>
    <div class="status-badge" id="statusBadge">설정 필요</div>
  </div>
  <div class="search-wrap">
    <input 
      class="search-input" 
      id="searchInput"
      type="text" 
      placeholder="원단명으로 검색..."
      autocomplete="off"
    />
    <button class="search-btn" id="searchBtn" onclick="doSearch()">
      <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="#000" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg>
    </button>
  </div>
</div>

<!-- 설정 패널 -->
<div class="setup-panel">
  <div class="setup-header" onclick="toggleSetup()">
    <div class="setup-header-left">
      <svg class="setup-icon" viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      API 설정
    </div>
    <span class="setup-arrow" id="setupArrow">▼</span>
  </div>
  <div class="setup-body" id="setupBody">
    <div class="setup-field">
      <div class="setup-label">API Key</div>
      <input class="setup-input" id="apiKeyInput" type="password" placeholder="AIzaSy..."/>
    </div>
    <div class="setup-field">
      <div class="setup-label">Spreadsheet ID</div>
      <input class="setup-input" id="sheetIdInput" type="text" placeholder="1oyIwn0jsUg..."/>
    </div>
    <div class="setup-field">
      <div class="setup-label">시트 이름 (기본값: Sheet1)</div>
      <input class="setup-input" id="sheetNameInput" type="text" placeholder="Sheet1"/>
    </div>
    <button class="save-btn" onclick="saveConfig()">저장하기</button>
  </div>
</div>

<div class="main">
  <div class="error-msg" id="errorMsg"></div>

  <!-- 초기 화면 -->
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-icon">🧵</div>
    <div class="welcome-title">원단 단가를 빠르게 검색하세요</div>
    <div class="welcome-sub">위에서 API 설정을 저장한 후<br>원단명을 입력해 검색하세요</div>
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loadingScreen">
    <div class="spinner"></div>
    <div class="loading-text">검색 중...</div>
  </div>

  <!-- 결과 없음 -->
  <div class="empty" id="emptyScreen">
    <div class="empty-emoji">🔍</div>
    <div class="empty-text">검색 결과가 없어요</div>
  </div>

  <!-- 결과 목록 -->
  <div id="resultsScreen" style="display:none">
    <div class="results-header">
      <div class="results-count" id="resultsCount"></div>
    </div>
    <div id="resultsList"></div>
  </div>
</div>

<script>
  const CONFIG_KEY = 'fabric_search_config';
  let config = { apiKey: '', sheetId: '', sheetName: 'Sheet1' };

  // 저장된 설정 불러오기
  function loadConfig() {
    try {
      const saved = localStorage.getItem(CONFIG_KEY);
      if (saved) {
        config = JSON.parse(saved);
        document.getElementById('apiKeyInput').value = config.apiKey || '';
        document.getElementById('sheetIdInput').value = config.sheetId || '';
        document.getElementById('sheetNameInput').value = config.sheetName || 'Sheet1';
        if (config.apiKey && config.sheetId) {
          updateStatus(true);
        }
      }
    } catch(e) {}
  }

  function saveConfig() {
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    const sheetId = document.getElementById('sheetIdInput').value.trim();
    const sheetName = document.getElementById('sheetNameInput').value.trim() || 'Sheet1';

    if (!apiKey || !sheetId) {
      showError('API Key와 Spreadsheet ID를 모두 입력해주세요.');
      return;
    }

    config = { apiKey, sheetId, sheetName };
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
    updateStatus(true);
    toggleSetup();
    showError('');

    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('welcomeScreen').innerHTML = `
      <div class="welcome-icon">✅</div>
      <div class="welcome-title">설정 완료!</div>
      <div class="welcome-sub">이제 원단명을 검색해보세요</div>
    `;
    document.getElementById('welcomeScreen').style.display = 'block';
  }

  function updateStatus(connected) {
    const badge = document.getElementById('statusBadge');
    if (connected) {
      badge.textContent = '연결됨';
      badge.classList.add('connected');
    } else {
      badge.textContent = '설정 필요';
      badge.classList.remove('connected');
    }
  }

  function toggleSetup() {
    const body = document.getElementById('setupBody');
    const arrow = document.getElementById('setupArrow');
    body.classList.toggle('open');
    arrow.classList.toggle('open');
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.toggle('active', !!msg);
  }

  function showScreen(name) {
    document.getElementById('welcomeScreen').style.display = name === 'welcome' ? 'block' : 'none';
    document.getElementById('loadingScreen').classList.toggle('active', name === 'loading');
    document.getElementById('emptyScreen').classList.toggle('active', name === 'empty');
    document.getElementById('resultsScreen').style.display = name === 'results' ? 'block' : 'none';
  }

  async function doSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    if (!config.apiKey || !config.sheetId) {
      showError('먼저 API 설정을 저장해주세요.');
      toggleSetup();
      return;
    }

    showError('');
    showScreen('loading');

    try {
      // Google Sheets API로 전체 데이터 가져오기
      const range = encodeURIComponent(`${config.sheetName}!A:E`);
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${config.sheetId}/values/${range}?key=${config.apiKey}`;

      const res = await fetch(url);
      const data = await res.json();

      if (data.error) {
        throw new Error(data.error.message);
      }

      const rows = data.values || [];
      if (rows.length <= 1) {
        showScreen('empty');
        return;
      }

      // 1행은 헤더, 2행부터 데이터
      const headers = rows[0];
      const dataRows = rows.slice(1);

      // 검색어로 필터링 (제품명 A열 기준)
      const keyword = query.toLowerCase();
      const filtered = dataRows.filter(row => {
        const name = (row[0] || '').toLowerCase();
        return name.includes(keyword);
      });

      if (filtered.length === 0) {
        showScreen('empty');
        return;
      }

      // 결과 렌더링
      const countEl = document.getElementById('resultsCount');
      countEl.innerHTML = `<span>${filtered.length}</span>개 결과`;

      const list = document.getElementById('resultsList');
      list.innerHTML = filtered.map(row => {
        const name = row[0] || '-';
        const price = row[1] || '-';
        const material = row[2] || '';
        const width = row[3] || '';
        const weight = row[4] || '';

        const tags = [];
        if (material) tags.push({ label: material, highlight: false });
        if (width) tags.push({ label: `폭 ${width}`, highlight: false });
        if (weight) tags.push({ label: `${weight}gsm`, highlight: true });

        return `
          <div class="card">
            <div class="card-name">${name}</div>
            <div class="card-price">
              ${price !== '-' ? price : '-'}
              <span class="card-price-label"> / Y</span>
            </div>
            ${tags.length > 0 ? `
              <div class="card-tags">
                ${tags.map(t => `<span class="tag ${t.highlight ? 'highlight' : ''}">${t.label}</span>`).join('')}
              </div>
            ` : ''}
          </div>
        `;
      }).join('');

      showScreen('results');

    } catch (err) {
      showScreen('welcome');
      showError(`오류: ${err.message}`);
    }
  }

  // 엔터키 검색
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  // 초기화
  loadConfig();

  // 설정 없으면 자동으로 설정 패널 열기
  if (!config.apiKey) {
    document.getElementById('setupBody').classList.add('open');
    document.getElementById('setupArrow').classList.add('open');
  }
</script>
</body>
</html>
